<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 435" font-family="'Courier New', Courier, monospace" font-size="13">
  <rect width="900" height="435" fill="#1a1a2e" rx="8"/>

  <!-- Stage 1 label -->
  <text x="30" y="40" fill="#6eccaf" font-size="15" font-weight="bold">Stage 1: WAT Scan</text>

  <!-- Stage 1 boxes -->
  <rect x="30" y="65" width="240" height="90" rx="4" fill="none" stroke="#6eccaf" stroke-width="1.5"/>
  <text x="150" y="95" text-anchor="middle" fill="#e0e0e0" font-weight="bold">Common Crawl</text>
  <text x="150" y="115" text-anchor="middle" fill="#e0e0e0">WAT S3 bucket</text>
  <text x="150" y="138" text-anchor="middle" fill="#888" font-size="12">~2.5B records/crawl</text>

  <!-- Arrow 1 -->
  <line x1="280" y1="110" x2="330" y2="110" stroke="#6eccaf" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="340" y="65" width="240" height="90" rx="4" fill="none" stroke="#6eccaf" stroke-width="1.5"/>
  <text x="460" y="95" text-anchor="middle" fill="#e0e0e0" font-weight="bold">Shopify Signal</text>
  <text x="460" y="115" text-anchor="middle" fill="#e0e0e0">Detection</text>
  <text x="460" y="138" text-anchor="middle" fill="#888" font-size="12">~100K files/crawl</text>

  <!-- Arrow 2 -->
  <line x1="590" y1="110" x2="640" y2="110" stroke="#6eccaf" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="650" y="65" width="220" height="90" rx="4" fill="none" stroke="#6eccaf" stroke-width="1.5"/>
  <text x="760" y="95" text-anchor="middle" fill="#e0e0e0" font-weight="bold">Parquet Dataset</text>
  <text x="760" y="115" text-anchor="middle" fill="#e0e0e0">+ WARC offsets</text>
  <text x="760" y="138" text-anchor="middle" fill="#888" font-size="12">~125M records/crawl</text>

  <!-- Divider -->
  <line x1="30" y1="190" x2="870" y2="190" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Stage 2 label -->
  <text x="30" y="230" fill="#e8a87c" font-size="15" font-weight="bold">Stage 2: WARC Fetch</text>

  <!-- Stage 2 boxes -->
  <rect x="30" y="255" width="240" height="90" rx="4" fill="none" stroke="#e8a87c" stroke-width="1.5"/>
  <text x="150" y="285" text-anchor="middle" fill="#e0e0e0" font-weight="bold">Parquet with</text>
  <text x="150" y="305" text-anchor="middle" fill="#e0e0e0">WARC coordinates</text>
  <text x="150" y="328" text-anchor="middle" fill="#888" font-size="12">offset + length</text>

  <!-- Arrow 3 -->
  <line x1="280" y1="300" x2="330" y2="300" stroke="#e8a87c" stroke-width="1.5" marker-end="url(#arrow-right)"/>

  <rect x="340" y="255" width="240" height="90" rx="4" fill="none" stroke="#e8a87c" stroke-width="1.5"/>
  <text x="460" y="285" text-anchor="middle" fill="#e0e0e0" font-weight="bold">Byte-range fetch</text>
  <text x="460" y="305" text-anchor="middle" fill="#e0e0e0">from Common Crawl's S3</text>
  <text x="460" y="328" text-anchor="middle" fill="#888" font-size="12">skip 95% of data</text>

  <!-- Arrow 4 -->
  <line x1="590" y1="300" x2="640" y2="300" stroke="#e8a87c" stroke-width="1.5" marker-end="url(#arrow-right)"/>

  <rect x="650" y="255" width="220" height="90" rx="4" fill="none" stroke="#e8a87c" stroke-width="1.5"/>
  <text x="760" y="285" text-anchor="middle" fill="#e0e0e0" font-weight="bold">Full HTML +</text>
  <text x="760" y="305" text-anchor="middle" fill="#e0e0e0">extracted fields</text>
  <text x="760" y="328" text-anchor="middle" fill="#888" font-size="12">products, apps, etc.</text>

  <!-- Arrow down from Full HTML to Summary -->
  <line x1="760" y1="345" x2="760" y2="375" stroke="#e8a87c" stroke-width="1.5" marker-end="url(#arrow-right)"/>

  <!-- Host crawl summary box -->
  <rect x="640" y="375" width="240" height="45" rx="4" fill="none" stroke="#e8a87c" stroke-width="1.5"/>
  <text x="760" y="393" text-anchor="middle" fill="#e0e0e0" font-size="13">Host Crawl Summary</text>
  <text x="760" y="408" text-anchor="middle" fill="#888" font-size="11">1 row per host per crawl</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polyline points="0,0 9,4 0,8" fill="none" stroke="#6eccaf" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-right" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polyline points="0,0 9,4 0,8" fill="none" stroke="#e8a87c" stroke-width="1.5"/>
    </marker>
  </defs>
</svg>
